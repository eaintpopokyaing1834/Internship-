<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
        }
        h1{
            width: 400px;
            height: 250px;
            text-align:center;
            align-items:center;
            display:flex;
            justify-content:center ;
            border:1px solid black;
            border-radius: 30px;
            margin:auto;
            background-color: white;
        }
        .yellow{
            background-color: rgb(162, 162, 96);
            width:500px;
            height:300px;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border:5px solid red;
            border-radius: 20px;
            padding-left:50px;
            padding-right:50px;
            padding-top:50px;
            padding-bottom:50px;
            margin:auto;
            margin-top: 200px;
            margin-left:400px;
            margin-right:200px;

        }
        body{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="yellow">
        <h1>Card Content</h1>
    </div>

</body>
</html>
