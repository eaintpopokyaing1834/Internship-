<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-pink-200">
    <div class="w-1/3 flex justify-between bg-white border-2 border-black rounded-md mx-auto mt-40 ">
      <div class="flex flex-col  gap-4 ml-6">
        <h2 class="text-xl font-bold p-4">Update Variables</h2>
        <label class=" text-md font-bold">Name (String):</label>
        <input type="text" class="user-input border-2 border-gray-300 " id="nameInput" />

        <label class="text-md font-bold">Age (Number):</label>
        <input type="text" class="user-input border-2 border-gray-300" id="ageInput" />

        <label class="text-md font-bold ">VIP Status(Boolean):</label>
        <input type="checkbox" class="check" id="vipInput" />

        <label class="text-md font-bold">Card Color:</label>
        <input type="color" class="mb-4" id="colorInput" />
      </div>

      <div class="flex flex-col gap-4 mr-6 ">
        <h2 class="text-xl font-bold p-4 mr-8 ">Live DOM Output</h2>
        <div id="box" class=" box border-black  border-2 rounded-lg p-4 mr-8 break-all w-50">
          <span id="vipBadge" class="hidden border-none border-black  rounded-xl bg-yellow-400 text-black px-2 ">VIP MEMBER</span>
          <h3 id="nameOutput"></h3>
          <p >Age:<span id="ageOutput"></span></p>
        </div>
      </div>
    </div>
  </body>

  <script>
    const nameInput = document.getElementById("nameInput");
    const ageInput = document.getElementById("ageInput");
    const vipInput = document.getElementById("vipInput");
    const colorInput = document.getElementById("colorInput");

    const nameOutput = document.getElementById("nameOutput");
    const ageOutput = document.getElementById("ageOutput");
    const vipBadge = document.getElementById("vipBadge");
    const box = document.querySelector(".box");

    // Name update
    nameInput.addEventListener("input", () => {
      nameOutput.textContent = nameInput.value ;
    });

    // Age update
    ageInput.addEventListener("input", () => {
      ageOutput.textContent = ageInput.value ;
    });

    // VIP checkbox
    vipInput.addEventListener("change", () => {
      if (vipInput.checked) {
        vipBadge.style.display = "inline-block";
      } else {
        vipBadge.style.display = "none";
      }
    });

    // Color change
    colorInput.addEventListener("input", () => {
      box.style.backgroundColor = colorInput.value;
    });
  </script>
  </html>
