<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calculator</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
        }

        body{
            background-color: rgb(112, 216, 202);
            font-family: sans-serif;
        }
        .calculator{
            row-gap:20px;
            text-align: center;
            width:400px;
            height:auto;
            margin:auto;
            display:flex;
            flex-direction:column;
            align-items:center;
            margin-top:200px;
            background-color: white;
            border-radius:8px;
            padding-bottom: 20px;
        }
        .mini{
            display:flex;
            margin-top:20px;
        }
        .main{
            height:30px;
            display:flex;
            column-gap:20px;
        }

        .user-input{
            width:100px;
            height:30px;
            border-radius:5px;
            border:1px solid black;
            padding: 5px;
        }

        select{
            width:50px;
        }
        .amount{
            background-color: blue;
            width:300px;
            height:45px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor:pointer;
        }

        .btn{
            background-color: transparent;
            border:none;
            color:white;
            font-weight:bold;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .result{
            width:300px;
            border:1px solid gray;
            display:flex;
            background-color:rgb(236, 228, 228);
            align-items:center;
            justify-content: space-between;
            padding: 10px 20px;
        }
        .result span{
            color:green;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <!-- Fixed the 'di' to 'div' here -->
    <div class="calculator">
        <div class="mini">
            <h4>Mini Calculator</h4>
        </div>
        <div class="main">
            <input type="number" class="user-input" id="num1" value="5">

            <select id="operator">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>

            <input type="number" class="user-input" id="num2" value="6">
        </div>

        <div class="amount">
            <button onclick="calculate()" class="btn">
                Calculate Amount
            </button>
        </div>

        <div class="result">
            <h4>Result:</h4>
            <span id="result">0</span>
        </div>

        <script>
            function calculate(){
                // Get the raw input values first
                const val1 = document.getElementById("num1").value;
                const val2 = document.getElementById("num2").value;
                const operator = document.getElementById("operator").value;
                const resultEl = document.getElementById("result");

                // Validation: Check if inputs are empty
                if (val1 === "" || val2 === "") {
                    resultEl.textContent = "Enter niumber!";
                    return; 
                }

                // Convert to numbers for math
                const num1 = Number(val1);
                const num2 = Number(val2);
                let result;

                switch(operator){
                    case "+":
                        result = num1 + num2;
                        break;
                    case "-":
                        result = num1 - num2;
                        break;
                    case "*":
                        result = num1 * num2;
                        break;
                    case "/":
                        result = num2 !== 0 ? num1 / num2 : "Error: /0";
                        break;
                    default:
                        result = "Error";
                }

                // Display the result
                resultEl.textContent = result;
            }
        </script>
    </div>
</body>
</html>
