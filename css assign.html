<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width", initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
        }
        h3{
            width:auto;
            height:30px;
            color:white;
            text-align: center;
            align-items: center;
            /* background-color:grey; */
        }
        nav{
            display: flex;
            justify-content: space-between;
            column-gap:normal;
            text-align: center;
            align-items: center;
            background-color:black;
            padding:15px 30px;

        }
        .HAC{
            display: flex;
            justify-content: space-between;
            column-gap:30px;
            align-items: center;
           
        }

        .HAC a{
             color:white;
        }
        
        .ft{
            display: flex;
            justify-content: space-between;
           /* text-align: center; */
            /* align-items: center; */
            column-gap: 30px;
        }
        .ftt{
            padding-left:120px;
            margin-left:15px;
            margin-top: 30px;
            margin-right:30px;
            width: 300px;
            height:50px;
            display:flex;
            column-gap:10px;
            align-items: center;
            text-align:center;
            justify-content: space-between;
            border-radius: 10px;
        }
        .control{
            display:flex;
            gap:20px;
        }
            
        .left{
            /* display:flex; */
             border: 1px solid black; 
             padding:10px 10px;
            margin:50px;
            row-gap:40px;
            width:700px;
            height:400px;
        }
        .form select{
            gap:20px;
            display: flex;
            flex-direction: column;
            width:100%;
            height: 40px;
            padding:10px;
            border:1px solid black;
            border-radius:10px;
        }
        .right{
            display:flex;
            flex-direction: column;
            border:1px solid black;
            padding:10px 10px;
            margin:50px;
            background-color: white;
            width:700px;
            height:400px;
        } 
        .alex{
            color:white;
            row-gap:20px;
            padding:30px;
            padding-top:50px; 
            padding-left:10px;  
            padding-bottom:100px; 
            padding-right:30px; 
            width: 300px;
            height: 50px;
            justify-content:center ;
            text-align: center;
            align-items:center;
            flex-direction: column;
            margin:auto;
            background-color: blue;
        }
        .button{
        
                border: none;
                color: white;
                padding: 20px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 16px;
                margin-left: 60px;
                background-color: blue;
        }
            
        .submit{
            border: none;
                color: white;
                padding: 20px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 16px;
                margin-left: 60px;
                background-color: blue;
        }
       
    </style>
</head>

<body>
    <h1>CSS Utility Simulator</h1>
    <p>Change the inputs below to see how atomic classes combine to build UIs.</p>
    <nav>
        <h3>My Logo</h3>
        <div class="HAC">
            <a href>Home</a>
            <a href>About</a>
            <a href>Contact</a>
        </div>
    </nav>
    <div class="ft">
        <div class="ftt" style="background-color: aqua;">
            <p>Feature 1</p>
        </div>
        <div  class="ftt" style="background-color: aqua;">
            <p>Feature 2</p>
         </div>
        <div  class="ftt" style="background-color: aqua;">
            <p>Feature 3</p>
        </div>
    </div>
        <!-- left side -->
            <div class="control">
                <div class="left">
                <h2><b>Utility Controls</b></h2>
                <div class="form">
                <label>Padding (Spacing)</label>
                <select>
                    <option>Medium(p-8) </option>
                </select>
                </div>
                <div class="form">
                <label>Background Theme(Colors)</label>
                <select>
                    <option>Primary Blue </option>
                </select>
                </div>
                <div class="form">
                <label>Text Size(Typography)</label>
                <select>
                    <option>Large(text-xl) </option>
                </select>
                </div>
                <div class="form">
                <label>Corner Radius(Borders)</label>
                <select>
                    <option>Square(rounded-none)</option>
                </select>
                </div>
                <div class="form">
                <label>Shadow(Depth)</label>
                <select>
                    <option>Medium(shadow-md) </option>
                </select>
                </div>
                </div>
                <!-- right side -->
            <div class="right">
                <div class="alex">
                    <h3>Alex Walker</h3>
                    <p>Full-Stack Web Development building awesome things with Tailwind CSS.</p>
                </div>
            </div>
            </div>

            <div class="button" button type="submit">Submit</div>
            <div class="submit" button type="submit">Hover Me Slowly!</div>

            
            
</body>
</html>
